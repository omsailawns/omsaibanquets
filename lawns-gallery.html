<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery | Om Sai Lawns</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#f6f1ea;
    --card:#ffffff;
    --gold:#C5A059;
    --text:#3a3a3a;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Montserrat',sans-serif;
    background:var(--bg);
    color:var(--text);
}

/* NAVBAR */
.top-nav{
    position:fixed;
    top:12px;
    width:100%;
    display:flex;
    justify-content:center;
    z-index:999;
}

.nav-pill{
    display:flex;
    gap:18px;
    background:rgba(255,255,255,0.7);
    padding:10px 18px;
    border-radius:40px;
    backdrop-filter:blur(6px);
    box-shadow:0 3px 10px rgba(0,0,0,0.06);
    overflow-x:auto;
    white-space:nowrap;
}
.nav-pill::-webkit-scrollbar{display:none;}

.nav-pill a{
    color:var(--text);
    text-decoration:none;
    font-size:14px;
}
.nav-pill a:hover{color:var(--gold);}

/* HERO */
.hero{
    margin-top:70px;
    height:34vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;

    background:
    linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.55)),
    url('lawns4.jpeg');

    background-size:cover;
    background-position:center;
}

.hero h1{
    font-family:'Playfair Display',serif;
    color:var(--gold);
    font-size:2rem;
}

.quote{
    color:#eee;
    font-style:italic;
    font-size:14px;
}

/* GALLERY */
.gallery{
    padding:25px 16px 60px;
    max-width:1000px;
    margin:auto;
}

.section-title{
    color:var(--gold);
    margin:15px 0 8px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
    gap:8px;
}

.grid img{
    width:100%;
    height:110px;
    object-fit:cover;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

.grid img:hover{
    transform:scale(1.05);
}

/* FULL SCREEN VIEWER */
.viewer{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.viewer img{
    max-width:95%;
    max-height:90%;
    border-radius:8px;
}

.close{
    position:absolute;
    top:20px;
    right:25px;
    color:white;
    font-size:28px;
    cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){
.nav-pill{width:92%;gap:14px;}
}
</style>
</head>

<body>

<!-- NAV -->
<div class="top-nav">
<nav class="nav-pill">
<a href="lawns-availability.html">Availability</a>
<a href="lawns-about.html">About</a>
<a href="lawns-gallery.html">Gallery</a>
<a href="lawns-videos.html">Videos</a>
<a href="lawns-story.html">Our Story</a>
<a href="lawns-services.html">Services</a>
<a href="lawns-contact.html">Contact</a>
</nav>
</div>

<!-- HERO -->
<section class="hero">
<h1>Lawns Gallery</h1>
<p class="quote">"Moments under the open sky."</p>
</section>

<!-- GALLERY -->
<section class="gallery">

<h3 class="section-title">Lawn Setup</h3>
<div class="grid">
<img src="mainlawns1.jpeg" onclick="openViewer(this)">
<img src="lawns2.jpeg" onclick="openViewer(this)">
<img src="lawns3.jpeg" onclick="openViewer(this)">
</div>

<h3 class="section-title">Decoration</h3>
<div class="grid">
<img src="lawns4.jpeg" onclick="openViewer(this)">
<img src="lawns5.jpeg" onclick="openViewer(this)">
</div>

<h3 class="section-title">Night Events</h3>
<div class="grid">
<img src="lawns6.jpeg" onclick="openViewer(this)">
<img src="lawns7.jpeg" onclick="openViewer(this)">
</div>



</section>

<!-- VIEWER -->
<div class="viewer" id="viewer">
<span class="close" onclick="closeViewer()">×</span>
<img id="viewerImg">
</div>

<script>
function openViewer(img){
document.getElementById("viewer").style.display="flex";
document.getElementById("viewerImg").src=img.src;
}

function closeViewer(){
document.getElementById("viewer").style.display="none";
}
</script>

</body>
</html>
