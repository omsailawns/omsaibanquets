<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery | Om Sai Banquet Hall</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#f6f1ea;
    --card:#ffffff;
    --gold:#C5A059;
    --text:#3a3a3a;
    --muted:#8c8c8c;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Montserrat',sans-serif;
    background:var(--bg);
    color:var(--text);
}

/* NAVBAR */
.top-nav{
    position:fixed;
    top:12px;
    width:100%;
    display:flex;
    justify-content:center;
    z-index:999;
}

.nav-pill{
    display:flex;
    gap:18px;
    background:rgba(255,255,255,0.7);
    padding:10px 18px;
    border-radius:40px;
    backdrop-filter:blur(6px);
    box-shadow:0 3px 10px rgba(0,0,0,0.06);
    overflow-x:auto;
    white-space:nowrap;
}
.nav-pill::-webkit-scrollbar{display:none;}

.nav-pill a{
    color:var(--text);
    text-decoration:none;
    font-size:14px;
}
.nav-pill a:hover{color:var(--gold);}

/* HERO */
.hero{
    margin-top:70px;
    height:36vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;

    background:
    linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.55)),
    url('dinning1.jpeg');

    background-size:cover;
    background-position:center;
}

.hero h1{
    font-family:'Playfair Display',serif;
    color:var(--gold);
    font-size:2.2rem;
    text-shadow:0 2px 6px rgba(0,0,0,0.4);
}

.quote{
    margin-top:6px;
    font-size:14px;
    color:#f1f1f1;
    font-style:italic;
}

/* GALLERY */
.gallery{
    padding:25px 14px 40px;
    max-width:1100px;
    margin:auto;
}

.section-title{
    margin:18px 0 10px;
    color:var(--gold);
    font-family:'Playfair Display',serif;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
    gap:8px;
}

.grid img{
    width:100%;
    height:110px;
    object-fit:cover;
    border-radius:8px;
    cursor:pointer;
    transition:.25s;
}

.grid img:hover{
    transform:scale(1.03);
}

/* FULLSCREEN VIEWER */
.viewer{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.viewer img{
    max-width:95%;
    max-height:90%;
    border-radius:8px;
}

.close{
    position:absolute;
    top:20px;
    right:24px;
    font-size:28px;
    color:white;
    cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){
.nav-pill{width:92%;gap:14px;}
.hero h1{font-size:1.9rem;}
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="top-nav">
<nav class="nav-pill">
<a href="availability.html">Availability</a>
<a href="about.html">About</a>
<a href="gallery.html">Gallery</a>
<a href="videos.html">Videos</a>
<a href="story.html">Our Story</a>
<a href="services.html">Services</a>
<a href="contact.html">Contact</a>
</nav>
</div>

<!-- HERO -->
<section class="hero">
<h1>Banquet Gallery</h1>
<p class="quote">"Moments captured, memories preserved forever."</p>
</section>

<!-- GALLERY CONTENT -->
<section class="gallery">

<h2 class="section-title">Main Wedding Hall</h2>
<div class="grid">
<img src="hall 1.jpeg" onclick="openViewer(this)">
<img src="hall 2.jpeg" onclick="openViewer(this)">
<img src="hall 3.jpeg" onclick="openViewer(this)">
</div>

<h2 class="section-title">Dining Hall</h2>
<div class="grid">
<img src="dinning 3.jpeg" onclick="openViewer(this)">
<img src="dinning 4.jpeg" onclick="openViewer(this)">
<img src="dinning 5.jpeg" onclick="openViewer(this)">
<img src="dinning 7.jpeg" onclick="openViewer(this)">
<img src="dinning1.jpeg" onclick="openViewer(this)">
</div>

<h2 class="section-title">Kitchen</h2>
<div class="grid">
<img src="https://images.unsplash.com/photo-1556911220-e15b29be8c8f" onclick="openViewer(this)">
<img src="https://images.unsplash.com/photo-1506368249639-73a05d6f6488" onclick="openViewer(this)">
</div>

<h2 class="section-title">Rooms</h2>
<div class="grid">
<img src="room 1.jpeg" onclick="openViewer(this)">
<img src="passage 1.jpeg" onclick="openViewer(this)">
</div>

<h2 class="section-title">Others</h2>
<div class="grid">
<img src="main1.jpeg" onclick="openViewer(this)">
<img src="main2.jpeg" onclick="openViewer(this)">
</div>

</section>

<!-- VIEWER -->
<div class="viewer" id="viewer">
<span class="close" onclick="closeViewer()">×</span>
<img id="viewerImg">
</div>

<script>
function openViewer(img){
document.getElementById("viewer").style.display="flex";
document.getElementById("viewerImg").src=img.src;
}

function closeViewer(){
document.getElementById("viewer").style.display="none";
}
</script>

</body>
</html>
