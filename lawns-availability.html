<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Availability | Om Sai Lawns</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#f6f1ea;
    --gold:#C5A059;
    --text:#3a3a3a;
    --available:#d4f4dd;
    --booked:#ffd6d6;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Montserrat',sans-serif;
    background:var(--bg);
    color:var(--text);
}

/* NAVBAR */
.top-nav{
    position:fixed;
    top:12px;
    width:100%;
    display:flex;
    justify-content:center;
    z-index:999;
}

.nav-pill{
    display:flex;
    gap:18px;
    background:rgba(255,255,255,0.7);
    padding:10px 18px;
    border-radius:40px;
    backdrop-filter:blur(6px);
    box-shadow:0 3px 10px rgba(0,0,0,0.06);
    overflow-x:auto;
    white-space:nowrap;
}
.nav-pill::-webkit-scrollbar{display:none;}

.nav-pill a{
    color:var(--text);
    text-decoration:none;
    font-size:14px;
}
.nav-pill a:hover{color:var(--gold);}

/* HERO */
.hero{
    margin-top:70px;
    height:34vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;

    background:
    linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.55)),
    url('lawns2.jpeg');

    background-size:cover;
    background-position:center;
}

.hero h1{
    font-family:'Playfair Display',serif;
    color:var(--gold);
    font-size:2rem;
}

.quote{
    color:#eee;
    font-style:italic;
    font-size:14px;
}

/* CALENDAR SECTION */
.calendar-section{
    padding:25px 16px 60px;
    max-width:500px;
    margin:auto;
}

.calendar-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.calendar-header button{
    background:var(--gold);
    border:none;
    color:white;
    padding:5px 10px;
    border-radius:5px;
    cursor:pointer;
}

.calendar-header h2{
    font-size:18px;
}

.weekdays{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    text-align:center;
    font-weight:600;
    margin-bottom:5px;
    font-size:13px;
}

.days{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:5px;
}

.day{
    padding:10px 0;
    text-align:center;
    border-radius:8px;
    font-size:13px;
}

.available{background:var(--available);}
.booked{background:var(--booked);}
.empty{background:transparent;}

.legend{
    margin-top:15px;
    display:flex;
    justify-content:space-around;
    font-size:13px;
}

/* MOBILE */
@media(max-width:768px){
.nav-pill{width:92%;gap:14px;}
}
</style>
</head>

<body>

<!-- NAV -->
<div class="top-nav">
<nav class="nav-pill">
<a href="lawns-availability.html">Availability</a>
<a href="lawns-about.html">About</a>
<a href="lawns-gallery.html">Gallery</a>
<a href="lawns-videos.html">Videos</a>
<a href="lawns-story.html">Our Story</a>
<a href="lawns-services.html">Services</a>
<a href="lawns-contact.html">Contact</a>
</nav>
</div>

<!-- HERO -->
<section class="hero">
<h1>Lawns Availability</h1>
<p class="quote">"Celebrate under the open sky."</p>
</section>

<!-- CALENDAR -->
<section class="calendar-section">

<div class="calendar-header">
<button onclick="changeMonth(-1)">‹</button>
<h2 id="monthYear"></h2>
<button onclick="changeMonth(1)">›</button>
</div>

<div class="weekdays">
<div>Sun</div><div>Mon</div><div>Tue</div>
<div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
</div>

<div class="days" id="calendarDays"></div>

<div class="legend">
<div><span style="background:#d4f4dd;padding:5px 10px;border-radius:5px;"></span> Available</div>
<div><span style="background:#ffd6d6;padding:5px 10px;border-radius:5px;"></span> Booked</div>
</div>

</section>

<script>
let currentDate = new Date();

const bookedDates = [
"2026-02-25",
"2026-02-28",
"2026-03-05"
];

function renderCalendar(){
const month = currentDate.getMonth();
const year = currentDate.getFullYear();

document.getElementById("monthYear").innerText =
currentDate.toLocaleString('default', { month: 'long' }) + " " + year;

const firstDay = new Date(year, month, 1).getDay();
const totalDays = new Date(year, month + 1, 0).getDate();

const calendar = document.getElementById("calendarDays");
calendar.innerHTML = "";

for(let i=0; i<firstDay; i++){
calendar.innerHTML += `<div class="day empty"></div>`;
}

for(let day=1; day<=totalDays; day++){
let fullDate = year + "-" +
String(month+1).padStart(2,'0') + "-" +
String(day).padStart(2,'0');

let className = bookedDates.includes(fullDate) ? "booked" : "available";

calendar.innerHTML += `<div class="day ${className}">${day}</div>`;
}
}

function changeMonth(step){
currentDate.setMonth(currentDate.getMonth()+step);
renderCalendar();
}

renderCalendar();
</script>

</body>
</html>
