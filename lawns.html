<style>
:root{
    --gold:#C5A059;
    --white:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Montserrat',sans-serif;
    overflow-x:hidden;
}

/* NAVIGATION */
.top-nav{
    position:absolute;
    width:100%;
    top:15px;
    display:flex;
    justify-content:center;
    z-index:100;
}

.nav-pill{
    display:flex;
    gap:20px;
    background:rgba(0,0,0,0.55);
    padding:12px 28px;
    border-radius:40px;
    backdrop-filter:blur(6px);
}

.nav-pill a{
    color:var(--white);
    text-decoration:none;
    font-size:14px;
    font-weight:500;
}

.nav-pill a:hover{
    color:var(--gold);
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;

    background:
    linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.6)),
    url('mainlawns1.jpeg');

    background-size:cover;
    background-position:center;
}

.overlay h1{
    font-family:'Playfair Display',serif;
    font-size:2.5rem;
    color:var(--gold);
    margin-bottom:10px;
}

.overlay p{
    color:white;
    font-size:1.1rem;
    letter-spacing:1px;
}

/* MOBILE */
@media(max-width:768px){

.nav-pill{
    gap:14px;
    padding:10px 18px;
    overflow-x:auto;
}

.nav-pill::-webkit-scrollbar{
    display:none;
}

.overlay h1{
    font-size:2rem;
}

.overlay p{
    font-size:1rem;
}
}
</style>
