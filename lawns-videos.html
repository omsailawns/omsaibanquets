<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Videos | Om Sai Lawns</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#f6f1ea;
    --gold:#C5A059;
    --text:#3a3a3a;
    --card:#ffffff;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Montserrat',sans-serif;
    background:var(--bg);
    color:var(--text);
}

/* NAVBAR */
.top-nav{
    position:fixed;
    top:12px;
    width:100%;
    display:flex;
    justify-content:center;
    z-index:999;
}

.nav-pill{
    display:flex;
    gap:18px;
    background:rgba(255,255,255,0.7);
    padding:10px 18px;
    border-radius:40px;
    backdrop-filter:blur(6px);
    box-shadow:0 3px 10px rgba(0,0,0,0.06);
    overflow-x:auto;
    white-space:nowrap;
}
.nav-pill::-webkit-scrollbar{display:none;}

.nav-pill a{
    color:var(--text);
    text-decoration:none;
    font-size:14px;
}
.nav-pill a:hover{color:var(--gold);}

/* HERO */
.hero{
    margin-top:70px;
    height:34vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;

    background:
    linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.55)),
    url('https://images.unsplash.com/photo-1529634806980-85c3dd6d34ac?auto=format&fit=crop&q=80');

    background-size:cover;
    background-position:center;
}

.hero h1{
    font-family:'Playfair Display',serif;
    color:var(--gold);
    font-size:2rem;
}

.quote{
    color:#eee;
    font-style:italic;
    font-size:14px;
}

/* VIDEO SECTION */
.videos{
    padding:25px 16px 60px;
    max-width:1000px;
    margin:auto;
}

.section-title{
    color:var(--gold);
    margin:15px 0 8px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:12px;
}

.video-card{
    background:var(--card);
    padding:10px;
    border-radius:12px;
    box-shadow:0 4px 14px rgba(0,0,0,0.05);
}

video{
    width:100%;
    border-radius:8px;
}

/* MOBILE */
@media(max-width:768px){
.nav-pill{width:92%;gap:14px;}
.grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<!-- NAV -->
<div class="top-nav">
<nav class="nav-pill">
<a href="lawns-availability.html">Availability</a>
<a href="lawns-about.html">About</a>
<a href="lawns-gallery.html">Gallery</a>
<a href="lawns-videos.html">Videos</a>
<a href="lawns-story.html">Our Story</a>
<a href="lawns-services.html">Services</a>
<a href="lawns-contact.html">Contact</a>
</nav>
</div>

<!-- HERO -->
<section class="hero">
<h1>Lawns Videos</h1>
<p class="quote">"Experience celebrations in motion."</p>
</section>

<!-- VIDEOS -->
<section class="videos">

<h3 class="section-title">Wedding Highlights</h3>
<div class="grid">
<div class="video-card">
<video controls src="lawns1.mp4"></video>
</div>

<div class="video-card">
<video controls src="lawns2.mp4"></video>
</div>
</div>



</section>

</body>
</html>
